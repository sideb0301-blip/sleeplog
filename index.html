<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>SLEEP.LOG</title>
<meta name="theme-color" content="#050a05">
<!-- iOS home-screen webapp -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SLEEP.LOG">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{
    --bg:#050a05;
    --phos:#33ff66;      /* P1 phosphor green */
    --phos-dim:#1f9940;
    --phos-faint:#0e4a20;
    --amber:#ffc234;     /* warning / late */
    --danger:#ff5b4a;    /* high risk */
    --scan:rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--phos);
    font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,"Courier New",monospace;
    font-size:15px;
    line-height:1.5;
    letter-spacing:.02em;
    min-height:100%;
    padding:calc(18px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
    text-shadow:0 0 4px rgba(51,255,102,.45);
    overflow-x:hidden;
    -webkit-touch-callout:none;
    -webkit-user-select:none;user-select:none;
  }
  /* CRT overlays */
  body::before{ /* scanlines */
    content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(to bottom,transparent 0 2px,var(--scan) 2px 3px);
    mix-blend-mode:multiply;
  }
  body::after{ /* vignette + flicker */
    content:"";position:fixed;inset:0;pointer-events:none;z-index:49;
    background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%);
    animation:flick 6s infinite steps(60);
  }
  @keyframes flick{0%,97%{opacity:1}98%{opacity:.93}100%{opacity:1}}
  @media (prefers-reduced-motion:reduce){body::after{animation:none}}

  .wrap{max-width:560px;margin:0 auto;position:relative;z-index:1}

  header{border:1px solid var(--phos-dim);padding:10px 12px;margin-bottom:16px}
  .bar{display:flex;justify-content:space-between;align-items:baseline}
  h1{font-size:16px;font-weight:700;letter-spacing:.18em}
  .ver{color:var(--phos-dim);font-size:11px}
  .sub{color:var(--phos-dim);font-size:11px;margin-top:4px;letter-spacing:.1em}

  .clock{font-size:42px;font-weight:700;letter-spacing:.04em;margin:18px 0 2px;line-height:1}
  .clock .sec{color:var(--phos-dim);font-size:24px}
  .date{color:var(--phos-dim);font-size:12px;letter-spacing:.14em;margin-bottom:18px}

  .status{
    border:1px solid var(--phos-faint);
    padding:12px;margin-bottom:18px;
    background:rgba(20,80,40,.10);
  }
  .status .k{color:var(--phos-dim);font-size:11px;letter-spacing:.1em}
  .status .v{font-size:18px;font-weight:700;margin-top:2px}
  .status.warn{border-color:var(--amber);color:var(--amber);text-shadow:0 0 4px rgba(255,194,52,.5)}
  .status.danger{border-color:var(--danger);color:var(--danger);text-shadow:0 0 5px rgba(255,91,74,.5)}
  .risk{margin-top:8px;font-size:12px;line-height:1.5}

  .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
  button{
    font-family:inherit;font-size:15px;font-weight:700;letter-spacing:.06em;
    color:var(--phos);background:transparent;
    border:1px solid var(--phos);border-radius:0;
    padding:18px 10px;cursor:pointer;
    text-shadow:0 0 4px rgba(51,255,102,.5);
    transition:background .08s,color .08s;
    -webkit-tap-highlight-color:transparent;
  }
  button:hover,button:focus-visible{background:var(--phos);color:var(--bg);text-shadow:none;outline:none}
  button:active{transform:translateY(1px)}
  button.big{grid-column:1 / -1;padding:22px 10px;font-size:18px}
  button .lbl{display:block;font-size:10px;color:inherit;opacity:.7;letter-spacing:.16em;margin-bottom:5px}
  button:hover .lbl,button:focus-visible .lbl{opacity:.9}
  button:disabled{border-color:var(--phos-faint);color:var(--phos-faint);text-shadow:none;cursor:not-allowed}

  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--phos-faint);border:1px solid var(--phos-faint);margin-bottom:22px}
  .metric{background:var(--bg);padding:10px 8px;text-align:center}
  .metric .n{font-size:20px;font-weight:700}
  .metric .l{font-size:9px;color:var(--phos-dim);letter-spacing:.1em;margin-top:3px}

  .logwrap{border:1px solid var(--phos-dim);padding:10px 0 0}
  .loghead{display:flex;justify-content:space-between;padding:0 12px 8px;border-bottom:1px solid var(--phos-faint)}
  .loghead span{font-size:11px;color:var(--phos-dim);letter-spacing:.1em}
  .log{max-height:240px;overflow-y:auto;padding:4px 0}
  .row{display:grid;grid-template-columns:62px 1fr auto;gap:8px;padding:5px 12px;font-size:12px;align-items:baseline}
  .row .d{color:var(--phos-dim)}
  .row .bed{color:var(--phos)}
  .row .bed.late{color:var(--amber)}
  .row .bed.vlate{color:var(--danger)}
  .row .dur{color:var(--phos-dim);text-align:right;white-space:nowrap}
  .empty{padding:22px 12px;color:var(--phos-dim);font-size:12px;text-align:center;line-height:1.6}

  .cursor{display:inline-block;width:8px;height:15px;background:var(--phos);
    margin-left:3px;vertical-align:-2px;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}

  .foot{margin-top:18px;font-size:10px;color:var(--phos-faint);letter-spacing:.1em;line-height:1.7}
  .foot a{color:var(--phos-dim);cursor:pointer;text-decoration:underline}

  ::-webkit-scrollbar{width:8px}
  ::-webkit-scrollbar-thumb{background:var(--phos-faint)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="bar">
      <h1>SLEEP.LOG</h1>
      <span class="ver">v0.1 // local</span>
    </div>
    <div class="sub">就寝時刻を押さえる → 夜食を断つ → 数値を守る</div>
  </header>

  <div class="clock" id="clock">--:--<span class="sec">:--</span></div>
  <div class="date" id="date">----.--.-- ---</div>

  <div class="status" id="status">
    <div class="k">CURRENT STATE</div>
    <div class="v" id="stateText">未記録</div>
    <div class="risk" id="riskText"></div>
  </div>

  <div class="btns" id="btns">
    <button class="big" id="bedBtn"><span class="lbl">PRESS TO</span>就寝 — SLEEP</button>
    <button id="wakeBtn" disabled><span class="lbl">PRESS TO</span>起床 — WAKE</button>
    <button id="undoBtn"><span class="lbl">FIX LAST</span>取消 — UNDO</button>
  </div>

  <div class="metrics">
    <div class="metric"><div class="n" id="mAvg">--:--</div><div class="l">AVG 就寝(7d)</div></div>
    <div class="metric"><div class="n" id="mDur">--h</div><div class="l">AVG 睡眠(7d)</div></div>
    <div class="metric"><div class="n" id="mStreak">0</div><div class="l">早寝 連続日</div></div>
  </div>

  <div class="logwrap">
    <div class="loghead"><span>// LOG</span><span id="logCount">0 records</span></div>
    <div class="log" id="log"></div>
  </div>

  <div class="foot">
    DATA STORED LOCALLY ON THIS DEVICE.<br>
    早寝の閾値 = <span id="thr">24:30</span> 以前の就寝。<a id="setThr">[変更]</a><br>
    NEXT: Googleスプレッドシート連携 (GAS) / Apple Health 取込
    <span class="cursor"></span>
  </div>
</div>

<script>
/* ---------- storage ----------
   recordsの構造を最初からGAS送信しやすい形にしておく。
   各record: { bed:ISO, wake:ISO|null }
   後でこの配列をそのままGASにPOSTすればスプレッドシートに転記できる。 */
const KEY="sleeplog.v1";
const THRKEY="sleeplog.threshold"; // 分単位 (24:30 = 24*60+30 = 1470, 翌日基準)
let state=load();
function load(){
  try{const r=JSON.parse(localStorage.getItem(KEY));if(Array.isArray(r))return {records:r};}catch(e){}
  return {records:[]};
}
function save(){localStorage.setItem(KEY,JSON.stringify(state.records));}
function getThreshold(){const v=parseInt(localStorage.getItem(THRKEY));return isNaN(v)?1470:v;} // 分(0=24:00基準ではなく深夜跨ぎ用に後述)
function setThreshold(m){localStorage.setItem(THRKEY,m);}

/* ---------- helpers ---------- */
const pad=n=>String(n).padStart(2,"0");
const DOW=["SUN","MON","TUE","WED","THU","FRI","SAT"];
function fmtTime(d){return pad(d.getHours())+":"+pad(d.getMinutes());}
/* 就寝時刻を「深夜跨ぎ込みの分」に変換: 18:00を一日の起点とし、就寝が翌2:00なら 8.0h後 = 480+... 
   ここでは閾値判定用に「正午起点の分」を使う。bed時刻の hour<12 は +24時間扱い。 */
function bedMinutes(d){
  let h=d.getHours();
  let m=h*60+d.getMinutes();
  if(h<12) m+=24*60;          // 0:00-11:59 は前夜の続きとみなし+24h
  return m;                    // 例 23:00→1380, 0:30→1470, 1:00→1500
}
function thrLabel(m){
  let h=Math.floor(m/60), mm=m%60;
  return pad(h)+":"+pad(mm);
}

/* ---------- clock ---------- */
function tick(){
  const n=new Date();
  document.getElementById("clock").innerHTML=
    pad(n.getHours())+":"+pad(n.getMinutes())+'<span class="sec">:'+pad(n.getSeconds())+'</span>';
  document.getElementById("date").textContent=
    n.getFullYear()+"."+pad(n.getMonth()+1)+"."+pad(n.getDate())+" "+DOW[n.getDay()];
}
setInterval(tick,1000);tick();

/* ---------- core actions ---------- */
function openRecord(){
  const last=state.records[state.records.length-1];
  return (last && !last.wake) ? last : null;
}
function pressBed(){
  if(openRecord())return; // 既に就寝中
  state.records.push({bed:new Date().toISOString(),wake:null});
  save();render();
}
function pressWake(){
  const o=openRecord();if(!o)return;
  o.wake=new Date().toISOString();
  save();render();
}
function undo(){
  const o=openRecord();
  if(o){state.records.pop();}            // 就寝中なら就寝記録を取消
  else if(state.records.length){          // 直近の起床を取消（就寝中に戻す）
    state.records[state.records.length-1].wake=null;
  }
  save();render();
}

/* ---------- analytics ---------- */
function durHours(r){
  if(!r.wake)return null;
  return (new Date(r.wake)-new Date(r.bed))/36e5;
}
function recentComplete(days){
  const cut=Date.now()-days*864e5;
  return state.records.filter(r=>r.wake&&new Date(r.bed).getTime()>=cut);
}
function avgBedRaw(days){
  const rs=recentComplete(days);if(!rs.length)return null;
  return rs.reduce((s,r)=>s+bedMinutes(new Date(r.bed)),0)/rs.length;
}
function avgBedLabel(days){
  const ab=avgBedRaw(days);if(ab==null)return null;
  let m=Math.round(ab)%(24*60);   // 24h表記に戻す
  return thrLabel(m);
}
function avgDur(days){
  const rs=recentComplete(days);if(!rs.length)return null;
  return rs.reduce((s,r)=>s+durHours(r),0)/rs.length;
}
function streak(){ // 直近から遡って早寝(閾値以前)が続く日数
  const thr=getThreshold();let c=0;
  for(let i=state.records.length-1;i>=0;i--){
    const r=state.records[i];if(!r.wake)continue;
    if(bedMinutes(new Date(r.bed))<=thr)c++;else break;
  }
  return c;
}

/* ---------- render ---------- */
function render(){
  const thr=getThreshold();
  document.getElementById("thr").textContent=thrLabel(thr);

  // buttons
  const open=openRecord();
  document.getElementById("bedBtn").disabled=!!open;
  document.getElementById("wakeBtn").disabled=!open;

  // status
  const st=document.getElementById("status");
  const stateText=document.getElementById("stateText");
  const riskText=document.getElementById("riskText");
  st.className="status";
  if(open){
    const bm=bedMinutes(new Date(open.bed));
    stateText.textContent="就寝中 — "+fmtTime(new Date(open.bed))+" IN BED";
    if(bm>thr+60){st.classList.add("danger");
      riskText.textContent="⚠ 就寝が遅い。夜食リスク高。何も食べずに即おやすみ。";}
    else if(bm>thr){st.classList.add("warn");
      riskText.textContent="やや遅め。ここで止めれば夜食は回避できる。";}
    else{riskText.textContent="良い時間。このペースなら数値は守れる。";}
  }else{
    // 今が起きている時間。現時刻が遅ければ警告
    const now=bedMinutes(new Date());
    if(state.records.length===0){
      stateText.textContent="未記録";
      riskText.textContent="寝るときに [就寝] を押すだけ。それだけ。";
    }else{
      stateText.textContent="起床中 — AWAKE";
      if(now>thr+60){st.classList.add("danger");
        riskText.textContent="⚠ もう"+thrLabel(now>=24*60?now-24*60:now)+"。夜更かし＝夜食ルートに乗ってる。寝よう。";}
      else if(now>thr){st.classList.add("warn");
        riskText.textContent="そろそろ就寝の閾値。今寝れば連続記録が伸びる。";}
      else{riskText.textContent="次に寝るとき [就寝] を押す。";}
    }
  }

  // metrics
  document.getElementById("mAvg").textContent=avgBedLabel(7)||"--:--";
  const ad=avgDur(7);
  document.getElementById("mDur").textContent=ad==null?"--h":ad.toFixed(1)+"h";
  document.getElementById("mStreak").textContent=streak();

  // log
  const log=document.getElementById("log");
  const recs=[...state.records].reverse();
  document.getElementById("logCount").textContent=state.records.length+" records";
  if(!recs.length){
    log.innerHTML='<div class="empty">NO DATA.<br>最初の夜に [就寝] を押すところから。</div>';return;
  }
  log.innerHTML=recs.map(r=>{
    const b=new Date(r.bed);
    const bm=bedMinutes(b);
    let cls="bed";if(bm>thr+60)cls+=" vlate";else if(bm>thr)cls+=" late";
    const dh=durHours(r);
    const dateStr=pad(b.getMonth()+1)+"/"+pad(b.getDate());
    const wakeStr=r.wake?("→"+fmtTime(new Date(r.wake))):"→ …";
    const durStr=dh==null?"in bed":dh.toFixed(1)+"h";
    return `<div class="row"><span class="d">${dateStr}</span>`+
           `<span class="${cls}">${fmtTime(b)} ${wakeStr}</span>`+
           `<span class="dur">${durStr}</span></div>`;
  }).join("");
}

/* ---------- wire ---------- */
document.getElementById("bedBtn").onclick=pressBed;
document.getElementById("wakeBtn").onclick=pressWake;
document.getElementById("undoBtn").onclick=undo;
document.getElementById("setThr").onclick=()=>{
  const cur=getThreshold();
  const inp=prompt("早寝の閾値を入力 (HH:MM / 深夜は25:00=翌1時 のように24超で指定可)",thrLabel(cur));
  if(!inp)return;
  const m=inp.match(/^(\d{1,2}):(\d{2})$/);
  if(!m){alert("形式: HH:MM");return;}
  setThreshold(parseInt(m[1])*60+parseInt(m[2]));
  render();
};
render();
</script>
</body>
</html>
